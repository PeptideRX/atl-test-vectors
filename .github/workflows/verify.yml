name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly so a regression in the published verifier is caught quickly.
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-frozen-hashes:
    runs-on: ubuntu-latest
    name: verify three frozen PDA hashes reproduce under live npm package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Verify
        run: node verify.mjs
